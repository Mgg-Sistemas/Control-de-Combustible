# Configuración de DigitalOcean App Platform (sitio estático).
# DEPLOY RÁPIDO: la web se compila en tu PC (`npm run deploy`) y se commitea la
# carpeta `dist`. DigitalOcean NO recompila: solo sirve esa carpeta ya lista, por
# lo que el deploy baja de ~3-5 min a ~30-60 s.
#
# ⚠️ En el PANEL de DigitalOcean deja el "Build Command" VACÍO y "Output
#    Directory" = dist. Así DO sube la carpeta compilada tal cual.
#
# Como se compila local, ya NO hacen falta las variables EXPO_PUBLIC_* en DO:
# quedan incrustadas en `dist` al compilar (toma las de tu .env local).
name: control-de-combustible
region: nyc
static_sites:
  - name: web
    github:
      repo: Mgg-Sistemas/Control-de-Combustible
      branch: main
      deploy_on_push: true
    # Sin build_command: DO sirve la carpeta `dist` ya compilada del repo.
    output_dir: dist
    # Todas las rutas caen en index.html (app de una sola página / SPA).
    catchall_document: index.html
